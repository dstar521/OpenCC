name: Build OpenCC Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Configure
      run: cmake -B build -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare package
      run: |
        mkdir opencc-win64
        copy build\Release\opencc.exe opencc-win64\
        copy build\Release\opencc.dll opencc-win64\
        xcopy data opencc-win64\data /E /I

    - name: Zip package
      run: powershell Compress-Archive opencc-win64 opencc-win64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: opencc-win64
        path: opencc-win64.zip
